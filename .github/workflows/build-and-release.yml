name: Build and Release WCA
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build and Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Ajuste Versao e Commit
          if [[ "$(git log -1 --pretty=format:'%an')" != "github-actions" ]]; then
            VERSION=$(grep 'AppVersion' src/config/settings.go | cut -d'"' -f2 | sed 's/v//')
            NEW_PATCH=$(echo $VERSION | cut -d. -f3 | awk '{print $1+1}')
            MAJOR_MINOR=$(echo $VERSION | cut -d. -f1-2)
            NEW_VERSION="v${MAJOR_MINOR}.${NEW_PATCH}"
            sed -i "s/AppVersion.*/AppVersion             = \"$NEW_VERSION\"/" src/config/settings.go
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add src/config/settings.go
            git commit -m "chore: version $NEW_VERSION"
            git tag $NEW_VERSION
            git push origin main
            git push origin $NEW_VERSION
            export TARGET_VERSION=$NEW_VERSION
          else
            export TARGET_VERSION=$(grep 'AppVersion' src/config/settings.go | cut -d'"' -f2)
          fi
          
          # 2. Build
          export CC="/home/runner/work/W-C-A_GO/W-C-A_GO/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          cd src
          go build -trimpath -ldflags="-s -w" -o whatsapp-wca-aarch64.bin .
          mv whatsapp-wca-aarch64.bin ../
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TARGET_VERSION }}
          name: "🚀 Release ${{ env.TARGET_VERSION }}"
          body: |
            ### 🤖 WCA - WhatsApp WCA (aarch64) - Versão ${{ env.TARGET_VERSION }}
            Binário compilado para Android.
            
            ### 📂 Instalação
            1. Coloque o binário `whatsapp-wca-aarch64.bin` em: `/data/data/net.dinglisch.android.taskerm/files/WCA/`
            
            ### ⚙️ Executar no Tasker (Java Code)
            ```java
            Runtime rt = Runtime.getRuntime(); String[] cmd = new String[]{"/system/bin/sh","-c","cd /data/data/net.dinglisch.android.taskerm/files/WCA && nohup /system/bin/linker64 /data/data/net.dinglisch.android.taskerm/files/WCA/whatsapp-wca-aarch64.bin rest --port 3000 </dev/null >/dev/null 2>&1 &"}; rt.exec(cmd);
            ```
            
            ### 🛑 Parar API (Run Shell)
            ```bash
            pid=$(ps -e -o PID,ARGS | grep "whatsapp-wca-aarch64" | grep -v grep | awk '{print $1}') && [ -n "$pid" ] && kill -9 $pid || echo "Process terminated"
            ```
          files: whatsapp-wca-aarch64.bin
