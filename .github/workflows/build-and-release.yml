name: Build and Release WCA

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set Version from Tag
        run: |
          TAG_NAME="${{ github.ref_name }}"
          
          # Caso 1: Tag com prefixo e versão (ex: core-1.2.1, ui-1.2.1)
          if [[ "$TAG_NAME" =~ ^([a-zA-Z0-9]+)-([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            PREFIX="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
            PREFIX_UPPER=$(echo "$PREFIX" | tr '[:lower:]' '[:upper:]')
            RELEASE_TITLE="🚀 [$PREFIX_UPPER] $VERSION"
            IS_RELEASE=true
          # Caso 2: Tag apenas com versão (ex: 1.2.1)
          elif [[ "$TAG_NAME" =~ ^([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            RELEASE_TITLE="🚀 $VERSION"
            IS_RELEASE=true
          # Caso 3: Tag de teste (ex: teste, dev, wip)
          else
            VERSION="$TAG_NAME"
            RELEASE_TITLE="🚀 $TAG_NAME"
            IS_RELEASE=false
          fi
          
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
          echo "IS_RELEASE=$IS_RELEASE" >> $GITHUB_ENV
          
          echo "✅ Configurações da build:"
          echo "   Tag Original:  $TAG_NAME"
          echo "   Versão Extraída: $VERSION"
          echo "   Título do Release: $RELEASE_TITLE"
          echo "   É Release Real?   $IS_RELEASE"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "ANDROID_NDK_HOME=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build and Patch WCA
        run: |
          export CC=$(find $ANDROID_NDK_HOME -name "aarch64-linux-android21-clang" | head -n 1)
          cd src
          FFMPEG_PATH="/data/data/net.dinglisch.android.taskerm/files/WCA/ffmpeg-wca-aarch64.bin"
          FFMPEG_FILES=$(grep -rl 'exec\.LookPath("ffmpeg")\|exec\.Command("ffmpeg"\|exec\.CommandContext.*"ffmpeg"\|wcaFFmpegCmd\|wcaFFmpegBin' . --include="*.go" 2>/dev/null | grep -v "/vendor/" || true)
          if [ -n "$FFMPEG_FILES" ]; then
            echo "$FFMPEG_FILES" | while read -r FILE; do
              DIR=$(dirname "$FILE")
              PKG=$(grep '^package ' "$FILE" | head -1 | awk '{print $2}')
              EXEC_FILE="$DIR/wca_ffmpeg_exec.go"
              cat > "$EXEC_FILE" << GOEXEC
          package $PKG
          import ("context"; "os/exec")
          const ( wcaLinker64 = "/system/bin/linker64"; wcaFFmpegBin = "$FFMPEG_PATH" )
          func wcaFFmpegCmd(args ...string) *exec.Cmd { full := append([]string{wcaFFmpegBin, "ffmpeg"}, args...); return exec.Command(wcaLinker64, full...) }
          func wcaFFmpegCmdCtx(ctx context.Context, args ...string) *exec.Cmd { full := append([]string{wcaFFmpegBin, "ffmpeg"}, args...); return exec.CommandContext(ctx, wcaLinker64, full...) }
          GOEXEC
              sed -i 's/exec\.LookPath("ffmpeg")/func() (string, error) { return wcaFFmpegBin, nil }()/g' "$FILE"
              sed -i 's/exec\.Command("ffmpeg",/wcaFFmpegCmd(/g' "$FILE"
              sed -i 's/exec\.Command("ffmpeg")/wcaFFmpegCmd()/g' "$FILE"
              sed -i 's/exec\.CommandContext(\([^,]*\), "ffmpeg",/wcaFFmpegCmdCtx(\1,/g' "$FILE"
            done
          fi
          
          GOOS=android GOARCH=arm64 CGO_ENABLED=1 \
            CC="$CC" \
            go build -trimpath -ldflags="-s -w" -o whatsapp-wca-aarch64.bin .
          mv whatsapp-wca-aarch64.bin ../
          
          # Compilar o proxy duplo (8081->3129 e 8082->3130) para Android aarch64
          GOOS=android GOARCH=arm64 CGO_ENABLED=1 \
            CC="$CC" \
            go build -trimpath -ldflags="-s -w" -o go_port_wca-aarch64.bin ../proxy/proxy.go
          mv go_port_wca-aarch64.bin ../

      - name: Build ffmpeg Standalone
        run: |
          export CC=$(find $ANDROID_NDK_HOME -name "aarch64-linux-android21-clang" | head -n 1)
          
          # Garantir ferramentas necessárias: binutils (readelf) e dpkg
          sudo apt-get install -y --no-install-recommends binutils dpkg zstd
          
          # Rodar o script python para obter o res.tar.zst e available_commands.txt do ffmpeg
          python3 .github/scripts/build_ffmpeg_bundle.py
          
          # Clonar o repositório run-android-executable
          git clone --depth 1 https://github.com/HunterXProgrammer/run-android-executable ffmpeg-builder
          
          # Copiar os assets gerados para o diretório clonado
          cp res.tar.zst ffmpeg-builder/
          cp available_commands.txt ffmpeg-builder/
          
          # Compilar o wrapper
          cd ffmpeg-builder
          GOOS=android GOARCH=arm64 CGO_ENABLED=1 \
            CC="$CC" \
            go build -buildvcs=false -trimpath -ldflags="-s -w -buildid=" -o ffmpeg-wca-aarch64.bin .
            
          # Mover binário gerado para a raiz do repositório principal
          mv ffmpeg-wca-aarch64.bin ../

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_TITLE }}
          body: |
            ### 🤖 WCA - WhatsApp WCA - ${{ env.NEW_VERSION }}
            
            ### 📂 Instalação (WhatsApp WCA)
            Coloque o binário `whatsapp-wca-aarch64.bin` em: `/data/data/net.dinglisch.android.taskerm/files/WCA/`
            
            ### ⚙️ Executar no Tasker (Java Code)
            ```java
            Runtime rt = Runtime.getRuntime(); String[] cmd = new String[]{"/system/bin/sh","-c","cd /data/data/net.dinglisch.android.taskerm/files/WCA && nohup /system/bin/linker64 /data/data/net.dinglisch.android.taskerm/files/WCA/whatsapp-wca-aarch64.bin rest --port 3000 </dev/null >/dev/null 2>&1 &"}; rt.exec(cmd);
            ```
            
            ### 🔍 Verificar API (Run Shell)
            ```bash
            sleep 0.2
            pgrep -f whatsapp-wca-aarch64 >/dev/null && echo "wca running" || echo "wca not running"
            ```
            
            ### 🛑 Parar API (Run Shell)
            ```bash
            pid=$(ps -e -o PID,ARGS | grep "whatsapp-wca-aarch64" | grep -v grep | awk '{print $1}') && [ -n "$pid" ] && kill -9 $pid || echo "Process terminated"
            ```
 
            ---
 
            ### 🔀 WCA - Build Proxy - ${{ env.NEW_VERSION }}
 
            ### 📂 Instalação (Proxy WCA)
            Coloque o binário `go_port_wca-aarch64.bin` em: `/data/data/net.dinglisch.android.taskerm/files/WCA/`
 
            ### ⚙️ Executar no Tasker (Java Code)
            ```java
            Runtime rt = Runtime.getRuntime(); String[] cmd = new String[]{"/system/bin/sh","-c","cd /data/data/net.dinglisch.android.taskerm/files/WCA && nohup /system/bin/linker64 /data/data/net.dinglisch.android.taskerm/files/WCA/go_port_wca-aarch64.bin </dev/null >/dev/null 2>&1 &"}; rt.exec(cmd);
            ```
 
            ### 🔍 Verificar Proxy (Run Shell)
            ```bash
            sleep 0.2
            pgrep -f go_port_wca-aarch64 >/dev/null && echo "proxy running" || echo "proxy not running"
            ```
 
            ### 🛑 Parar Proxy (Run Shell)
            ```bash
            pid=$(ps -e -o PID,ARGS | grep "go_port_wca-aarch64" | grep -v grep | awk '{print $1}') && [ -n "$pid" ] && kill -9 $pid || echo "Process terminated"
            ```
 
            ---
 
            ### 🎥 WCA - FFmpeg Standalone - ${{ env.NEW_VERSION }}
 
            ### 📂 Instalação (FFmpeg Standalone)
            Coloque o binário `ffmpeg-wca-aarch64.bin` em: `/data/data/net.dinglisch.android.taskerm/files/WCA/`
 
            ### ⚙️ Conversão de Áudio no Tasker (Java Code)
 
            > **`inputFile`** → caminho completo do arquivo de áudio de entrada (ex: `/storage/emulated/0/Download/audio.mp3`)
            > **`outputDir`** → pasta onde o arquivo `.opus` convertido será salvo
 
            ```java
            String inputFile = "path_input";
            String outputDir = "path_output";
            String baseName = inputFile.substring(inputFile.lastIndexOf("/") + 1).replaceAll("\\.[^.]*$", "");
            String outputFile = outputDir + "/" + baseName + ".opus";
 
            String quote = new String(new char[]{34});
            String newline = new String(new char[]{10});
 
            rt = Runtime.getRuntime();
            rt.exec(new String[]{"/system/bin/sh", "-c", "mkdir -p " + outputDir}).waitFor();
            rt.exec(new String[]{"/system/bin/sh", "-c", "rm -f " + outputDir + "/*.mp3 " + outputDir + "/*.wav " + outputDir + "/*.m4a " + outputDir + "/*.aac " + outputDir + "/*.ogg " + outputDir + "/*.flac " + outputDir + "/*.opus " + outputDir + "/*.amr"}).waitFor();
 
            String ffmpegCmd = "/system/bin/linker64 /data/data/net.dinglisch.android.taskerm/files/WCA/ffmpeg-wca-aarch64.bin ffmpeg -y -i " + quote + inputFile + quote + " -c:a libopus -b:a 32k -ar 24000 -ac 1 -application audio -vbr off -compression_level 10 -frame_duration 60 -packet_loss 1 -threads auto " + quote + outputFile + quote + " 2>&1";
 
            Process p = rt.exec(new String[]{"/system/bin/sh", "-c", ffmpegCmd});
            p.waitFor();
 
            java.io.BufferedReader br = new java.io.BufferedReader(new java.io.InputStreamReader(p.getInputStream()));
            StringBuilder sb = new StringBuilder();
            String line;
            while ((line = br.readLine()) != null) {
                sb.append(line);
                sb.append(newline);
            }
            local1 = sb.toString();
            ```
          files: |
            whatsapp-wca-aarch64.bin
            go_port_wca-aarch64.bin
            ffmpeg-wca-aarch64.bin
            task-project/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
