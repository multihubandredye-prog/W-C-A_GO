name: Build and Release WCA

on:
  push:
    branches: [main]
    paths: ['**.go', 'go.mod', 'go.sum']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Auto-increment Version and Tag
        run: |
          VERSION=$(grep 'AppVersion' src/config/settings.go | cut -d'"' -f2)
          NEW_VERSION=$(echo $VERSION | awk -F. -v OFS=. '{$NF++;print}')
          sed -i "s/$VERSION/$NEW_VERSION/g" src/config/settings.go
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add src/config/settings.go
          git commit -m "update"
          git tag $NEW_VERSION
          git push origin main
          git push origin $NEW_VERSION
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Install NDK and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_CC=$(pwd)/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV

      - name: Patch ffmpeg calls
        run: |
          cd src
          FFMPEG_PATH="/data/data/net.dinglisch.android.taskerm/files/WCA/ffmpeg-wca-aarch64.bin"
          FFMPEG_FILES=$(grep -rl 'exec\.LookPath("ffmpeg")\|exec\.Command("ffmpeg"\|exec\.CommandContext.*"ffmpeg"\|wcaFFmpegCmd\|wcaFFmpegBin' . --include="*.go" 2>/dev/null | grep -v "/vendor/" | grep -v "wca_ffmpeg_exec.go" || true)
          
          if [ -n "$FFMPEG_FILES" ]; then
            echo "$FFMPEG_FILES" | while read -r FILE; do
              DIR=$(dirname "$FILE")
              PKG=$(grep '^package ' "$FILE" | head -1 | awk '{print $2}')
              EXEC_FILE="$DIR/wca_ffmpeg_exec.go"
              cat > "$EXEC_FILE" << GOEXEC
          package $PKG
          import ("context"; "os/exec")
          const ( wcaLinker64 = "/system/bin/linker64"; wcaFFmpegBin = "$FFMPEG_PATH" )
          func wcaFFmpegCmd(args ...string) *exec.Cmd { full := append([]string{wcaFFmpegBin, "ffmpeg"}, args...); return exec.Command(wcaLinker64, full...) }
          func wcaFFmpegCmdCtx(ctx context.Context, args ...string) *exec.Cmd { full := append([]string{wcaFFmpegBin, "ffmpeg"}, args...); return exec.CommandContext(ctx, wcaLinker64, full...) }
          GOEXEC
              sed -i 's/exec\.LookPath("ffmpeg")/func() (string, error) { return wcaFFmpegBin, nil }()/g' "$FILE"
              sed -i 's/exec\.Command("ffmpeg",/wcaFFmpegCmd(/g' "$FILE"
              sed -i 's/exec\.Command("ffmpeg")/wcaFFmpegCmd()/g' "$FILE"
              sed -i 's/exec\.CommandContext(\([^,]*\), "ffmpeg",/wcaFFmpegCmdCtx(\1,/g' "$FILE"
            done
          fi

      - name: Build
        run: |
          cd src
          # Replicando a lógica do script: CGO_ENABLED=1 e compilador do NDK
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 \
            CC="${{ env.NDK_CC }}" \
            go build -trimpath -ldflags="-s -w" \
            -o whatsapp-wca-aarch64.bin .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_VERSION }}
          name: 🚀 Release ${{ env.NEW_VERSION }}
          body: |
            ### 🤖 WCA - WhatsApp WCA (aarch64) - Versão ${{ env.NEW_VERSION }}
            Binário compilado para Android.
            
            ---
            ### 🛠️ Instalação
            1. Insira o arquivo `whatsapp-wca-aarch64.bin` neste caminho no seu Android:
               `/data/data/net.dinglisch.android.taskerm/files/WCA/`
            
            ### ⚙️ Como executar no Tasker (Java Code)
            Utilize o seguinte código em uma tarefa **JavaScriptlet**:
            ```java
            Runtime rt = Runtime.getRuntime();
            String[] cmd = new String[]{
                "/system/bin/sh",
                "-c",
                "cd /data/data/net.dinglisch.android.taskerm/files/WCA && nohup /system/bin/linker64 /data/data/net.dinglisch.android.taskerm/files/WCA/whatsapp-wca-aarch64.bin rest --port 3000 </dev/null >/dev/null 2>&1 &"
            };
            rt.exec(cmd);
            ```
            ---
            *Compilado automaticamente via GitHub Actions.*
          files: src/whatsapp-wca-aarch64.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
