name: Build and Release WCA

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Android NDK r26
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "NDK_CC=$(pwd)/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV

      - name: go mod tidy
        run: |
          cd src
          go mod tidy

      - name: Patch ffmpeg calls
        run: |
          cd src
          FFMPEG_PATH="/data/data/net.dinglisch.android.taskerm/files/WCA/ffmpeg-wca-aarch64.bin"

          FFMPEG_FILES=$(grep -rl \
            'exec\.LookPath("ffmpeg")\|exec\.Command("ffmpeg"\|exec\.CommandContext.*"ffmpeg"\|wcaFFmpegCmd\|wcaFFmpegBin' \
            . --include="*.go" 2>/dev/null \
            | grep -v "/vendor/" \
            | grep -v "wca_ffmpeg_exec.go" || true)

          if [ -n "$FFMPEG_FILES" ]; then
            echo "$FFMPEG_FILES" | while read -r FILE; do
              DIR=$(dirname "$FILE")
              PKG=$(grep '^package ' "$FILE" | head -1 | awk '{print $2}')
              EXEC_FILE="$DIR/wca_ffmpeg_exec.go"

              cat > "$EXEC_FILE" << GOEXEC
          package $PKG

          import (
            "context"
            "os/exec"
          )

          const (
            wcaLinker64  = "/system/bin/linker64"
            wcaFFmpegBin = "$FFMPEG_PATH"
          )

          func wcaFFmpegCmd(args ...string) *exec.Cmd {
            full := append([]string{wcaFFmpegBin, "ffmpeg"}, args...)
            return exec.Command(wcaLinker64, full...)
          }

          func wcaFFmpegCmdCtx(ctx context.Context, args ...string) *exec.Cmd {
            full := append([]string{wcaFFmpegBin, "ffmpeg"}, args...)
            return exec.CommandContext(ctx, wcaLinker64, full...)
          }
          GOEXEC

              sed -i 's/exec\.LookPath("ffmpeg")/func() (string, error) { return wcaFFmpegBin, nil }()/g' "$FILE"
              sed -i 's/exec\.Command("ffmpeg",/wcaFFmpegCmd(/g' "$FILE"
              sed -i 's/exec\.Command("ffmpeg")/wcaFFmpegCmd()/g' "$FILE"
              sed -i 's/exec\.CommandContext(\([^,]*\), "ffmpeg",/wcaFFmpegCmdCtx(\1,/g' "$FILE"
            done
          fi

      - name: Build
        run: |
          cd src
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 \
            CC="${{ env.NDK_CC }}" \
            go build -trimpath -ldflags="-s -w" \
            -o whatsapp-wca-aarch64.bin .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: src/whatsapp-wca-aarch64.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
