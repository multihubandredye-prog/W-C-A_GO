name: Build Proxy - go_port_wca-aarch64.bin

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build Proxy
        run: |
          mkdir -p proxy-build
          cat > proxy-build/proxy.go << 'EOF'
          package main
          import ("bytes"; "encoding/json"; "fmt"; "io"; "net/http"; "time")
          const (WEBHOOK_PATH = "/Tasker"; HOSTNAME = "127.0.0.1"; DELAY_MS = 200)
          type DadosProxy struct { RecebidoEm time.Time; Origem string; Metodo string; URLOriginal string; Headers http.Header; Body json.RawMessage }
          func processadorFila(fila chan DadosProxy, portaDestino string) { for dados := range fila { time.Sleep(time.Duration(DELAY_MS) * time.Millisecond); payloadJSON, _ := json.Marshal(dados); destinoURL := fmt.Sprintf("http://%s:%s%s", HOSTNAME, portaDestino, WEBHOOK_PATH); proxyReq, _ := http.NewRequest("POST", destinoURL, bytes.NewBuffer(payloadJSON)); proxyReq.Header.Set("Content-Type", "application/json"); client := &http.Client{Timeout: 5 * time.Second}; client.Do(proxyReq) } }
          func novoHandler(fila chan DadosProxy) http.HandlerFunc { return func(w http.ResponseWriter, r *http.Request) { if r.URL.Path != WEBHOOK_PATH { http.NotFound(w, r); return }; bodyBytes, _ := io.ReadAll(r.Body); var rawBody json.RawMessage; json.Unmarshal(bodyBytes, &rawBody); dados := DadosProxy{RecebidoEm: time.Now(), Origem: "tasker", Metodo: r.Method, URLOriginal: r.URL.Path, Headers: r.Header, Body: rawBody}; fila <- dados; w.WriteHeader(http.StatusOK); json.NewEncoder(w).Encode(map[string]string{"status": "OK"}) } }
          func iniciarServidor(portaOrigem string, fila chan DadosProxy) { mux := http.NewServeMux(); mux.HandleFunc(WEBHOOK_PATH, novoHandler(fila)); http.ListenAndServe(":"+portaOrigem, mux) }
          func main() { fila1 := make(chan DadosProxy, 10000); go processadorFila(fila1, "3129"); go iniciarServidor("8081", fila1); fila2 := make(chan DadosProxy, 10000); go processadorFila(fila2, "3130"); go iniciarServidor("8082", fila2); select {} }
          EOF
          
          # Cross-compilação para Android aarch64 usando o NDK
          export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          cd proxy-build
          GOOS=android GOARCH=arm64 CGO_ENABLED=1 \
            CC="$CC" \
            go build -trimpath -ldflags="-s -w" -o go_port_wca-aarch64.bin proxy.go
          ls -lh go_port_wca-aarch64.bin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.sha }}
          name: 🚀 Proxy Build ${{ github.sha }}
          body: |
            ### 🤖 Proxy WCA (aarch64)
            Binário compilado para Android usando NDK.
            
            ### ⚙️ Execução no Tasker
            ```java
            Runtime rt = Runtime.getRuntime(); String[] cmd = new String[]{"/system/bin/sh","-c","cd /data/data/net.dinglisch.android.taskerm/files/WCA && nohup /system/bin/linker64 go_port_wca-aarch64.bin </dev/null >/dev/null 2>&1 &"}; rt.exec(cmd);
            ```
          files: proxy-build/go_port_wca-aarch64.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
